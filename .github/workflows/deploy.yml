name: CI-CD Production Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  ECR_REGISTRY: "281851731755.dkr.ecr.us-east-1.amazonaws.com"
  ECR_REPOSITORY: "cloud_delivery_pipeline_wso2_project1"
  IMAGE_TAG: "latest"
  AWS_ROLE_ARN: "arn:aws:iam::281851731755:role/github-actions-ecr-role"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Build Local Image Test Layer
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Secure Image to ECR Warehouse
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  deploy-to-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Execution and Live Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Update local system packages and install correct package names
            sudo apt-get update -y
            sudo apt-get install -y docker.io awscli

            # Log in to Amazon ECR using the correct AWS CLI binary path
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin 281851731755.dkr.ecr.us-east-1.amazonaws.com

            # Purge any stale active container profiles
            sudo docker rm -f wso2-runtime-service 2>/dev/null || true

            # Pull down the freshly scanned, secure image layer
            sudo docker pull 281851731755.dkr.ecr.us-east-1.amazonaws.com/cloud_delivery_pipeline_wso2_project1:latest

            # Spin up the active application container instance
            sudo docker run -d --name wso2-runtime-service -p 9443:9443 281851731755.dkr.ecr.us-east-1.amazonaws.com/cloud_delivery_pipeline_wso2_project1:latest
